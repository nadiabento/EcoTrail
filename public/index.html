<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrail - Mapa de Trilhos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <h1 class="main-title">🚀 EcoTrail: Aveiro</h1>
        <div class="controls">
            <label for="trail-selector">Escolha um Trilho:</label>
            <select id="trail-selector">
                <option value="1">Caminho do Sal</option>
                <option value="2">Passadiços de Aveiro</option>
                <option value="3">Reserva de S. Jacinto</option>
                <option value="4">Areinho - Espiunca</option>
                <option value="5">Rota das Laranjeiras (Sever do Vouga)</option>
                <option value="13">Passadiços da Barrinha de Esmoriz (Ovar)</option>
                <option value="15">Trilho da Pateira de Fermentelos (PR1-AGD)</option>
                <option value="16">Cascata da Cabreia e Minas do Braçal (Sever do Vouga)</option>
                <option value="17">Trebilhadouro (Vale de Cambra)</option>
                <option value="18">Ecopista do Vouga (Paradela - Foz do Rio Mau)</option>
                <option value="19">Viagem à Pré-História (Serra da Freita)</option>
                <option value="20">Rota das Padeiras (Ílhavo)</option>
                <option value="21">Aldeia Mágica de Drave</option>
            </select>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
