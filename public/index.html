<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrail - Mapa de Trilhos Interativo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <h1 class="main-title">🚀 EcoTrail: SIG</h1>

      <div class="controls">
        <div class="control-group">
          <label for="difficulty-filter">Filtrar por Nível</label>
          <select id="difficulty-filter" class="custom-select">
            <option value="todos">Todos os Trilhos</option>
            <option value="Fácil">Fácil</option>
            <option value="Moderado">Moderado</option>
            <option value="Difícil">Difícil</option>
          </select>
        </div>

        <div class="control-group">
          <label for="trail-selector">Escolha o Trilho</label>
          <select id="trail-selector" class="custom-select">
            <option value="">-- Aguardando filtro --</option>
          </select>
        </div>
      </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="script.js"></script>
  </body>
</html>
